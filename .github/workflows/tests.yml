name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install aiohttp aiosqlite httpx structlog

      - name: Smoke test (imports + schema + funnel invariants)
        run: python scripts/smoke_test.py
        # Cycle step is SKIP (not FAIL) when Polymarket API is unreachable in CI
